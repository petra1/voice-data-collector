<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petra Voice Data Collector</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Petra Voice Data Collector</h1>
      <p class="intro">
        Record short utterances and save clean <code>.wav</code> files for later
        Whisper fine-tuning.
      </p>

      <section class="panel" aria-labelledby="meta-heading">
        <h2 id="meta-heading">Recording Metadata</h2>
        <div class="grid">
          <label for="speakerId">Speaker ID</label>
          <input id="speakerId" type="text" value="petra" />

          <label for="sessionId">Session ID</label>
          <input id="sessionId" type="text" placeholder="e.g. 2026-04-26-am" />

          <label for="promptText">Prompt / Sentence</label>
          <textarea
            id="promptText"
            rows="3"
            placeholder="Type the sentence Petra should speak."
          ></textarea>
        </div>
      </section>

      <section class="panel controls" aria-labelledby="controls-heading">
        <h2 id="controls-heading">Controls</h2>
        <div class="button-row">
          <button id="startBtn" type="button">Start Recording</button>
          <button id="stopBtn" type="button" disabled>Stop</button>
          <button id="saveBtn" type="button" disabled>Save WAV</button>
          <button id="discardBtn" type="button" disabled>Discard</button>
        </div>
        <p id="status" role="status" aria-live="polite">
          Ready. Allow microphone access to start.
        </p>
        <audio id="preview" controls></audio>
      </section>

      <section class="panel" aria-labelledby="files-heading">
        <h2 id="files-heading">Saved in this Browser Session</h2>
        <ul id="savedList"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
